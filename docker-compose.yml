services:

  # ── Caddy: reverse proxy + TLS automático (ACME DNS Cloudflare) ───────────────
  caddy:
    build:
      context: ./deploy/proxy
    profiles:
      - standalone
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      ACME_EMAIL:          ${ACME_EMAIL:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      ROOT_DOMAIN:         ${ROOT_DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

  # ── Backend: Node.js / Express / SQLite ──────────────────────────────────────
  backend:
    build:
      context: ./
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "4000"
      NODE_ENV: production
      DATABASE_PATH: /app/data/database.sqlite
      JWT_SECRET: ${JWT_SECRET:?Debes definir JWT_SECRET en .env}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-https://${ROOT_DOMAIN}}
    volumes:
      - db_data:/app/data
    expose:
      - "4000"

  # ── Frontend: React (build) servido por nginx + proxy interno a socket.io ─────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      default:
      pconsu_shared:
        aliases:
          - easyno-frontend

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  pconsu_shared:
    external: true
    name: pconsu_default
